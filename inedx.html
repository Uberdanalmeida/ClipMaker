<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipMaker | AI Viral Moments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script
      src="https://upload-widget.cloudinary.com/latest/global/all.js"
      type="text/javascript"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="overflow-x-hidden">
    <!-- Subtle Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
      <div
        class="absolute -top-[25%] -left-[10%] w-[50%] h-[50%] bg-blue-600/10 blur-[120px] rounded-full"
      ></div>
      <div
        class="absolute -bottom-[25%] -right-[10%] w-[50%] h-[50%] bg-indigo-600/10 blur-[120px] rounded-full"
      ></div>
    </div>

    <main class="relative min-h-screen flex flex-col items-center">
      <!-- Header / Logo -->
      <header
        class="absolute top-0 w-full py-10 flex justify-center opacity-0 nav-el"
      >
        <div class="flex items-center space-x-2 title-el">
          <div
            class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/20"
          >
            <i data-lucide="zap" class="w-5 h-5 text-white fill-current"></i>
          </div>
          <span class="text-xl font-bold tracking-tighter">ClipMaker</span>
        </div>
      </header>

      <div
        class="w-full max-w-4xl flex flex-col items-center text-center mt-40 px-10"
      >
        <!-- Main CTA Section -->
        <div
          class="flex flex-col items-center space-y-6 mb-16 opacity-0 cta-el"
        >
          <!-- API Key Input -->
          <div class="w-full max-w-md relative group">
            <div
              class="absolute -inset-0.5 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl opacity-25 group-hover:opacity-50 transition duration-500 blur"
            ></div>
            <div
              class="relative flex items-center bg-slate-900/90 backdrop-blur-xl rounded-xl border border-slate-800 p-1"
            >
              <div class="pl-4 pr-2">
                <i data-lucide="key" class="w-5 h-5 text-slate-400"></i>
              </div>
              <input
                id="api-key"
                type="password"
                class="w-full bg-transparent text-slate-200 placeholder-slate-500 px-2 py-4 focus:outline-none text-base"
                placeholder="Cole sua Gemini API Key..."
              />
            </div>
          </div>

          <button
            id="upload-widget"
            class="upload-btn group relative flex items-center space-x-3 px-10 py-5 bg-blue-600 rounded-2xl font-bold text-lg hover:bg-blue-500 transition-colors"
          >
            <i data-lucide="upload" class="w-6 h-6"></i>
            <span>Começar Upload</span>
          </button>

          <!-- Loading State Display -->
          <div
            id="loading"
            class="hidden flex items-center space-x-3 text-slate-400 font-medium tracking-wide"
          >
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
            <span id="loading-text">Encontrando o momento viral...</span>
          </div>

          <!-- Error Toast (Minimalist) -->
          <div
            id="error"
            class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-red-500/10 border border-red-500/20 text-red-400 rounded-full text-sm font-medium backdrop-blur-md"
          >
            <div class="flex items-center space-x-2">
              <i data-lucide="alert-circle" class="w-4 h-4"></i>
              <span id="error-message">Erro ao processar vídeo</span>
            </div>
          </div>
        </div>

        <!-- Content Area: The Stage -->
        <div class="w-full opacity-0 video-el">
          <div
            class="glass video-glow rounded-[32px] p-2 aspect-video relative group overflow-hidden"
          >
            <!-- Video Placeholder / Background -->
            <div
              id="placeholder"
              class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 transition-all duration-700"
            >
              <div class="shimmer absolute inset-0 opacity-20"></div>
              <i
                data-lucide="play-circle"
                class="w-16 h-16 mb-4 stroke-[1px] opacity-20"
              ></i>
              <p class="text-sm font-medium uppercase tracking-[0.2em]">
                Ready for Canvas
              </p>
            </div>

            <!-- The Video Element -->
            <video
              id="video"
              src=""
              class="hidden w-full h-full object-cover rounded-[24px] shadow-2xl relative z-10"
              controls
            ></video>
          </div>
        </div>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
